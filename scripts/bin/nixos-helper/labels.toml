# Friendly labels and audio routing for nixos-helper.
# Anything not listed here falls back to the underlying hardware name.

##### Display connectors #####
[displays]
"DP-1" = "ProXDR"
"DP-3" = "Streaming"
"HDMI-A-2" = "S89C"

##### Audio output presets #####
# Each preset always appears in `audio list`, even when its card profile is
# currently `off` (e.g. HDMI sinks until something connects). `audio set <label>`
# activates the card profile, then sets the sink as default.
[[audio]]
label   = "Kanto TUK"
card    = "alsa_card.usb-Neural_DSP_Quad_Cortex-00"
profile = "output:analog-surround-71+input:analog-stereo"
sink    = "alsa_output.usb-Neural_DSP_Quad_Cortex-00.analog-surround-71"

[[audio]]
label   = "Devialet Phantoms"
card    = "alsa_card.pci-0000_01_00.1"            # NVIDIA AD102 HD Audio
profile = "output:hdmi-stereo"                    # adjust to -extra1/2/3 once the right HDMI port is known
sink    = "alsa_output.pci-0000_01_00.1.hdmi-stereo"
